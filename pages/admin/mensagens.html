<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../../assets/images/logo.png">
    <title>Admin - MathLab</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body class="admin-body">
    <!-- Sidebar Admin -->
    <aside class="admin-sidebar" id="adminSidebar">
        <div class="admin-sidebar-header">
            <i class="fas fa-crown"></i>
            <h2>MathLab Admin</h2>
        </div>

        <div class="admin-user">
            <div class="admin-user-avatar">
                <i class="fas fa-user-shield"></i>
            </div>
            <div class="admin-user-info">
                <h4>Zinko Dev</h4>
                <p>Administrador</p>
            </div>
        </div>

        <nav class="admin-nav">
            <a href="dashboard.html" class="admin-nav-item">
                <i class="fas fa-chart-pie"></i>
                <span>Dashboard</span>
            </a>
            <a href="metricas.html" class="admin-nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Métricas</span>
            </a>
            <a href="usuarios-pendentes.html" class="admin-nav-item">
                <i class="fas fa-users"></i>
                <span>Usuários</span>
            </a>
            <a href="mensagens.html" class="admin-nav-item active">
                <i class="fas fa-envelope"></i>
                <span>Mensagens</span>
            </a>
            <a href="logs.html" class="admin-nav-item">
                <i class="fas fa-history"></i>
                <span>Logs</span>
            </a>
        </nav>

        <div class="admin-sidebar-footer">
            <a href="../../index.html" class="admin-nav-item">
                <i class="fas fa-arrow-left"></i>
                <span>Voltar ao Site</span>
            </a>
            <button type="button" onclick="logoutAdmin()" class="admin-nav-item btn-logout-admin">
                <i class="fas fa-sign-out-alt"></i>
                <span>Sair</span>
            </button>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <div class="admin-header-left">
                <button type="button" class="admin-menu-toggle" id="adminMenuToggle" aria-label="Menu">
                    <i class="fas fa-bars"></i>
                </button>
                <h1><i class="fas fa-envelope"></i> Mensagens Recebidas</h1>
            </div>
            <div class="admin-header-actions">
                <button type="button" class="btn btn-secondary btn-small" onclick="carregarMensagens()"
                    id="btnAtualizar">
                    <i class="fas fa-sync-alt"></i> Atualizar
                </button>
            </div>
        </header>

        <div class="admin-content">
            <div id="adminPanel">
                <div id="mensagensLista" class="mensagens-lista">
                    <!-- Cards de mensagens serão inseridos aqui via JS -->
                    <div class="loading-spinner center group-spacing">
                        <i class="fas fa-spinner fa-spin fa-2x color-accent"></i>
                        <p class="group-spacing">Consultando banco de dados...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL DE RESPOSTA PREMIUM -->
    <div id="respostaModal" class="modal-premium">
        <div class="modal-glass-content">
            <header class="modal-header">
                <h3><i class="fas fa-reply"></i> Responder Mensagem</h3>
                <button type="button" class="btn-close" onclick="fecharModal()">&times;</button>
            </header>

            <div class="modal-body">
                <div id="modalMensagemOriginal" class="mensagem-original-card">
                    <!-- Mensagem original via JS -->
                </div>

                <div class="input-modern-group group-spacing">
                    <label for="respostaTexto"><i class="fas fa-edit"></i> Sua Resposta Profissional</label>
                    <textarea id="respostaTexto" class="input-modern" rows="5"
                        placeholder="Escreva aqui sua resposta ao usuário..."></textarea>
                </div>

                <!-- PREVIEW DO EMAIL -->
                <div class="email-preview-container group-spacing">
                    <h4><i class="fas fa-eye"></i> Visualização do Email</h4>
                    <div id="previewEmail" class="email-preview-box">
                        Escreva para visualizar o layout final...
                    </div>
                </div>
            </div>

            <footer class="modal-footer group-spacing">
                <button type="button" class="btn btn-secondary" onclick="fecharModal()">Descartar</button>
                <button type="button" class="btn btn-primary-action" onclick="enviarResposta()" id="btnEnviarResposta">
                    <i class="fas fa-paper-plane"></i> Enviar Agora
                </button>
            </footer>
        </div>
    </div>

    <script src="../../assets/js/script.js" type="module"></script>
    <script src="../../assets/js/modules/20-admin-core.js" type="module"></script>
    <script src="../../assets/js/modules/21-admin-messages.js" type="module"></script>
    <script type="module">
        // Funções globais necessárias se houver algum onclick legado
        window.logoutAdmin = () => {
            localStorage.removeItem('admin_logado');
            window.location.href = '../../index.html';
        };
    </script>
</body>

</html>
