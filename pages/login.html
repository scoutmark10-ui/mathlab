<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="../assets/images/logo.png">
    <title>Login - MathLab</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- CSS principal -->
</head>

<body class="auth-page">
    <!-- Fundo Premium -->
    <div class="auth-background">
        <div class="auth-orb orb-1"></div>
        <div class="auth-orb orb-2"></div>
        <div class="auth-orb orb-3"></div>
    </div>

    <!-- Header com voltar -->
    <div class="page-header auth-header">
        <a href="../index.html" class="back-arrow" aria-label="Voltar para a página inicial" title="Voltar ao Início">
            <i class="fas fa-arrow-left"></i>
            <span class="sr-only">Voltar</span>
        </a>
        <div class="header-logo">
            <i class="fas fa-square-root-variable"></i>
            <span>MathLab</span>
        </div>
        <div class="placeholder"></div>
    </div>

    <div class="auth-container glass-card">
        <!-- Título Dinâmico -->
        <div class="auth-title">
            <i class="fas fa-lock" id="authIcon"></i>
            <h1 id="authTitle">Bem-vindo de volta</h1>
            <p id="authSubtitle">Acesse sua conta para continuar seus estudos</p>
        </div>

        <!-- Mensagens de Feedback -->
        <div id="mensagem" class="auth-message"></div>

        <!-- Abas Premium -->
        <div class="auth-tabs">
            <button type="button" onclick="mostrarLogin()" id="btnLogin" class="auth-tab active">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <button type="button" onclick="mostrarCadastro()" id="btnCadastro" class="auth-tab">
                <i class="fas fa-user-plus"></i> Cadastro
            </button>
        </div>

        <!-- Formulário de Login -->
        <div id="loginDiv" class="auth-form active">
            <form id="loginForm">
                <div class="input-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email corporativo ou pessoal</label>
                    <input type="email" id="email" placeholder="exemplo@mathlab.com" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="senha"><i class="fas fa-key"></i> Senha de acesso</label>
                    <div class="input-wrapper">
                        <input type="password" id="senha" placeholder="Sua senha secreta" required
                            autocomplete="current-password">
                        <i class="fas fa-eye toggle-password" onclick="toggleSenha('senha', this)"></i>
                    </div>
                </div>
                <div class="form-extras">
                    <label class="remember-me">
                        <input type="checkbox" id="lembrar"> Salvar sessão
                    </label>
                    <a href="#" onclick="recuperarSenha()" class="forgot-password">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="auth-btn" id="btnSubmitLogin">
                    <span>Entrar no Sistema</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </form>
        </div>

        <!-- Formulário de Cadastro -->
        <div id="cadastroDiv" class="auth-form">
            <form id="cadastroForm">
                <div class="input-group">
                    <label for="nome"><i class="fas fa-user"></i> Nome completo</label>
                    <input type="text" id="nome" placeholder="Como devemos te chamar?" required autocomplete="name">
                </div>
                <div class="input-group">
                    <label for="emailCadastro"><i class="fas fa-envelope"></i> Email de contato</label>
                    <input type="email" id="emailCadastro" placeholder="seu@email.com" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="senhaCadastro"><i class="fas fa-key"></i> Nova senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="senhaCadastro" placeholder="Mínimo 6 caracteres" required
                            autocomplete="new-password">
                        <i class="fas fa-eye toggle-password" onclick="toggleSenha('senhaCadastro', this)"></i>
                    </div>
                </div>
                <button type="submit" class="auth-btn" id="btnSubmitCadastro">
                    <span>Criar Minha Conta</span>
                    <i class="fas fa-user-check"></i>
                </button>
            </form>
        </div>

        <!-- Separador Moderno -->
        <div class="auth-divider">
            <span>Ou autentique-se via</span>
        </div>

        <!-- Login Social -->
        <div class="auth-social">
            <button type="button" class="auth-social-btn google" id="btnGoogle">
                <i class="fab fa-google"></i>
                <span>Google Account</span>
            </button>
            <button type="button" class="auth-social-btn github" id="btnGithub">
                <i class="fab fa-github"></i>
                <span>GitHub ID</span>
            </button>
        </div>

        <!-- Footer Semântico -->
        <div class="auth-terms">
            Ao ingressar, você ratifica nossos
            <a href="termos.html">Termos</a> e
            <a href="privacidade.html">Privacidade</a>.
        </div>
    </div>

    <!-- Scripts do Sistema -->
    <script src="../assets/js/script.js" type="module"></script>
</body>

</html>
